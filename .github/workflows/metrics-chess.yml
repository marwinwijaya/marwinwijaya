name: Metrics (Chess)
on:
  schedule:
    - cron: "45 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics-chess:
    runs-on: ubuntu-latest
    env:
      LICHESS_USER: marwinwijaya
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install chess dependencies
        run: npm install --no-save chess.js

      - name: Generate chess card
        env:
          CHESS_TOKEN: ${{ secrets.CHESS_TOKEN }}
        run: node scripts/generate-chess.mjs

      - name: Commit chess card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics-chess.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: update chess metrics"
          git push
